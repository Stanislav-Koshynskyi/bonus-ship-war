<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Морський бій</title>
    <link rel="stylesheet" href="style.css">
    
    <link href="https://cdn.webdatarocks.com/latest/webdatarocks.min.css" rel="stylesheet"/>
    <script src="https://cdn.webdatarocks.com/latest/webdatarocks.toolbar.min.js"></script>
    <script src="https://cdn.webdatarocks.com/latest/webdatarocks.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>

</head>
<body>
    <body>

  <h1>Морський бій</h1>
  <div id="status"></div>

  <div id="register-screen" class="screen">
    <input type="text" id="nickname-input" placeholder="Введіть нікнейм">
    <button id="register-btn">Увійти</button>
  </div>

  <div id="lobby-screen" class="screen hidden">
    <h2>Лобі</h2>
    <button id="create-game-btn">Створити гру</button>
    <div id="games-list"></div>
  </div>

  <div id="placement-screen" class="screen hidden">
    <h2>Розміщення кораблів</h2>
    <div id="my-board-placement" class="board-container"></div>
    <button id="generate-btn">Згенерувати</button>
    <button id="ready-btn">Готово</button>
  </div>
  <div id="game-screen" class="screen hidden">
    <h2>Гра</h2>
    <div class="boards-wrapper">
      <div>
        <h3>Моє поле</h3>
        <div id="my-board-game" class="board-container"></div>
      </div>
      <div>
        <h3>Поле суперника</h3>
        <div id="enemy-board-game" class="board-container"></div>
      </div>
    </div>
    <div id="turn-indicator"></div>
  </div>

  <script src="script.js"></script>
</body>
</body>
</html>
